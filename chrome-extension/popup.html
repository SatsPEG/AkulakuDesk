<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AkulakuDesk Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F0F13;
      color: #E8E9ED;
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, #FF3D57, #FFA940);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: #fff;
    }
    .title { font-size: 16px; font-weight: 700; }
    .subtitle { font-size: 11px; color: #6B7280; }
    .status-card {
      background: #1A1A22; border-radius: 10px; padding: 14px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; font-size: 13px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 8px;
    }
    .dot-green { background: #10B981; }
    .dot-red { background: #6B7280; }
    .dot-yellow { background: #F59E0B; }
    .label { color: #9CA3AF; }
    .value { font-weight: 600; display: flex; align-items: center; }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: .15s; margin-top: 8px;
    }
    .btn-primary { background: #FF3D57; color: #fff; }
    .btn-primary:hover { background: #E2234B; }
    .btn-secondary { background: #1A1A22; color: #E8E9ED; border: 1px solid #2A2A35; }
    .btn-secondary:hover { background: #2A2A35; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .badge-ok { background: #064E3B; color: #6EE7B7; }
    .badge-off { background: #292524; color: #A8A29E; }
    .badge-data { background: #1E3A5F; color: #93C5FD; }
    .data-preview {
      background: #1A1A22; border-radius: 10px; padding: 14px;
      margin-top: 12px; max-height: 200px; overflow-y: auto;
      font-family: monospace; font-size: 11px; line-height: 1.5;
      color: #9CA3AF; white-space: pre-wrap; word-break: break-all;
    }
    .footer { margin-top: 12px; font-size: 10px; color: #4B5563; text-align: center; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">A</div>
    <div>
      <div class="title">AkulakuDesk Bridge</div>
      <div class="subtitle">Real-time data connector</div>
    </div>
  </div>

  <!-- Status Connection -->
  <div class="status-card">
    <div class="status-row">
      <span class="label">Akulaku Tab</span>
      <span class="value"><span class="status-dot dot-red" id="dotAkulaku"></span><span id="statusAkulaku">Not detected</span></span>
    </div>
    <div class="status-row">
      <span class="label">Vercel Dashboard</span>
      <span class="value"><span class="status-dot dot-red" id="dotVercel"></span><span id="statusVercel">Not detected</span></span>
    </div>
    <div class="status-row" style="border-top:1px solid #2A2A35;padding-top:10px;margin-top:6px">
      <span class="label">Status</span>
      <span class="value"><span id="bridgeStatus">⏳ Checking...</span></span>
    </div>
    <div class="status-row">
      <span class="label">Heartbeat</span>
      <span class="value"><span id="heartbeatCount">0</span> · <span class="label">Miss:</span> <span id="missedPongs">0</span></span>
    </div>
  </div>

  <!-- Last Data -->
  <div class="status-card" style="margin-bottom:0">
    <div class="status-row">
      <span class="label">Last Sync</span>
      <span class="value" id="lastSync">—</span>
    </div>
    <div class="status-row">
      <span class="label">Endpoint</span>
      <span class="value" id="lastEndpoint">—</span>
    </div>
    <div class="status-row">
      <span class="label">Data Items</span>
      <span class="value" id="dataCount">0</span>
    </div>
  </div>

  <!-- Data Preview -->
  <div class="data-preview" id="dataPreview">Waiting for data...</div>

  <!-- Actions -->
  <button class="btn btn-secondary" id="btnRefresh">🔄 Refresh Data</button>
  <button class="btn btn-primary" id="btnOpenDashboard">📊 Buka Dashboard</button>

  <div class="footer">AkulakuDesk Bridge v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
